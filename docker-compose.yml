services:
  vault:
    build: .
    restart: unless-stopped
    volumes:
      - vault_data:/data
    environment:
      - VAULT_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - vault

volumes:
  vault_data:
  caddy_data:
  caddy_config:
