services:
  vault:
    build: .
    restart: unless-stopped
    volumes:
      - vault_data:/data
    environment:
      - VAULT_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - VAULT_ADMIN_KEY=${VAULT_ADMIN_KEY:-}
      - VAULT_INVITE_ONLY=${VAULT_INVITE_ONLY:-}
      - VAULT_CORS_ORIGINS=${VAULT_CORS_ORIGINS:-}
      - QDRANT_URL=${QDRANT_URL:-}
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - vault

volumes:
  vault_data:
  caddy_data:
  caddy_config:
