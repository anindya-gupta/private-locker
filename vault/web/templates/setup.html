<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050507">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vault">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/vault-192.svg">
    <title>Vault — Sign Up</title>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
</head>
<body class="auth-page setup-page">

    <div class="auth-split">
        <!-- Left: Orb in welcoming/open state -->
        <div class="auth-visual">
            <div class="vault-orb-scene setup-orb" id="vault-orb">
                <div class="orb-glow orb-glow-welcome" id="orb-glow"></div>
                <svg class="ring-svg ring-svg-welcome" id="ring-svg" viewBox="0 0 400 400">
                    <g transform="translate(200,200)">
                        <circle class="ring ring-4" cx="0" cy="0" r="180"/>
                        <circle class="ring ring-1" cx="0" cy="0" r="155"/>
                        <circle class="ring ring-2" cx="0" cy="0" r="125"/>
                        <circle class="ring ring-3" cx="0" cy="0" r="95"/>
                        <circle class="ring ring-core" cx="0" cy="0" r="55"/>
                    </g>
                </svg>
                <div class="center-icon center-icon-welcome" id="center-icon">
                    <svg width="52" height="52" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5" color="var(--green)">
                        <rect x="8" y="22" width="32" height="22" rx="4"/>
                        <path d="M14 22V16a10 10 0 0 1 20 0v6" stroke-linecap="round" style="transform: translateY(-4px) rotate(-20deg); transform-origin: 34px 16px;"/>
                        <circle cx="24" cy="33" r="3" fill="currentColor"/>
                        <line x1="24" y1="36" x2="24" y2="40" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <div class="visual-tagline">
                <span class="tagline-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </span>
                End-to-end encrypted &bull; Zero-knowledge
            </div>
        </div>

        <!-- Right: Form panel -->
        <div class="auth-panel">
            <div class="auth-panel-inner" id="auth-card">
                <div class="auth-brand">
                    <div class="brand-icon brand-icon-green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <span class="brand-name">Vault</span>
                </div>

                <h1 class="auth-title">Create your <span class="gradient-text">Account</span></h1>
                <p class="subtitle">Your encrypted personal AI assistant.<br>All data is end-to-end encrypted.</p>

                <form id="setup-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Choose a username" autofocus required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="password">Create Master Password</label>
                        <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" id="confirm" placeholder="Type it again" required>
                    </div>
                    <div id="error" class="error-msg"></div>
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Create Account</span>
                        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </form>

                <p class="warning">If you forget this password, your data is permanently lost. There is no recovery mechanism.</p>
                <div class="auth-footer-text">
                    Already have an account? <a href="/login" class="auth-link">Log in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/auth-effects.js?v=6"></script>
    <script>
        const form = document.getElementById('setup-form');
        const errorEl = document.getElementById('error');
        const btn = document.getElementById('submit-btn');
        const btnText = btn.querySelector('.btn-text');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.textContent = '';

            const username = document.getElementById('username').value.trim();
            const pw = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (username.length < 3) { errorEl.textContent = 'Username must be at least 3 characters.'; return; }
            if (pw.length < 8) { errorEl.textContent = 'Password must be at least 8 characters.'; return; }
            if (pw !== confirm) { errorEl.textContent = 'Passwords do not match.'; return; }

            btn.disabled = true;
            btnText.textContent = 'Initializing...';

            try {
                const resp = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password: pw}),
                });
                if (resp.ok) {
                    if (window.playUnlockAnimation) {
                        window.playUnlockAnimation(() => { window.location.href = '/app'; });
                    } else {
                        window.location.href = '/app';
                    }
                } else {
                    const data = await resp.json();
                    errorEl.textContent = data.detail || 'Failed to initialize.';
                }
            } catch {
                errorEl.textContent = 'Connection error.';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
